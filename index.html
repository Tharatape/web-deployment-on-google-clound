<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Website</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #1a73e8; }
        p { color: #5f6368; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from Google Cloud!</h1>
        <p>Your custom directory is working perfectly.</p>
        <p>Current Time: <span id="time"></span></p>
    </div>

    <script>
        document.getElementById('time').innerText = new Date().toLocaleTimeString();
    </script>
</body>
</html>
